name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Pytest
        run: pytest -v

      - name: M1 verify gate
        run: bash scripts/verify_cservice_m1.sh

      - name: M2 verify gate
        run: bash scripts/verify_cservice_m2.sh

      - name: M3 verify gate
        run: bash scripts/verify_cservice_m3.sh

      - name: M4 verify gate
        run: bash scripts/verify_cservice_m4.sh

      - name: Dev script syntax
        run: bash -n scripts/dev-cservice.sh
